    // Cari grup yang belum tampil dalam 24 jam

        const win=window.open(url,"_blank");

        if(win){
          localStorage.setItem(lastKey,now);
          localStorage.setItem(CR_SEQ_KEY,(index+1)%CR_GROUPS.length);

          window.focus();

      }
